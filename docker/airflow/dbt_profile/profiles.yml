# Container-only dbt profile for the Airflow stack (mounted at /opt/airflow/dbt_profile).
#
# Secret-free: the BigQuery credential is read from GOOGLE_APPLICATION_CREDENTIALS — the
# service-account JSON that docker-compose mounts read-only into the container — so NO key
# (and no host-specific path) lives in this file. The host workflow keeps using its own
# transform/profiles.yml unchanged.
#
# The profile name must match `profile:` in transform/dbt_project.yml.
usda_food_prices:
  target: dev
  outputs:
    dev:
      type: bigquery
      method: service-account
      project: usda-food-prices
      dataset: usda_analytics          # default schema; staging/analytics schemas are set per-model
      location: US
      threads: 4
      keyfile: "{{ env_var('GOOGLE_APPLICATION_CREDENTIALS') }}"
      job_execution_timeout_seconds: 300
      job_retries: 1
