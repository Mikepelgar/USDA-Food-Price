# Phase 4 — local Apache Airflow stack (LocalExecutor) for the USDA food-price pipeline.
#
# Trimmed reference: Postgres (metadata DB) + a one-shot init + the scheduler + the
# webserver. LocalExecutor runs tasks in the scheduler process, so there is no Redis/worker
# (that's the heavier CeleryExecutor setup). All four Airflow services share one image and
# one config block (the `x-airflow-common` anchor below).
#
# Start it:   docker compose up -d --build
# Open the UI: http://localhost:8080   (login from .env: _AIRFLOW_WWW_USER_*)
# Stop it:    docker compose down       (add -v to also wipe the metadata DB volume)

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: docker/airflow/Dockerfile
  env_file:
    - .env                     # FDC_API_KEY / BLS_API_KEY / ERS_API_KEY -> into the containers
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    # The package lives at /opt/airflow/src; ingestion writes data under /opt/airflow/data.
    PYTHONPATH: /opt/airflow/src
    # OVERRIDES the host-relative value from .env: point dbt + the loader at the JSON we
    # mount read-only into the container. `environment:` wins over `env_file:`.
    GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/secrets/gcp-service-account.json
  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/src:ro
    - ./data:/opt/airflow/data
    - ./secrets:/opt/airflow/secrets:ro
    - ./.env:/opt/airflow/.env:ro                                  # so common.load_environment() works in-container
    - ./docker/airflow/dbt_profile:/opt/airflow/dbt_profile:ro     # container-only dbt profile
    - airflow-logs:/opt/airflow/logs
  user: "${AIRFLOW_UID:-50000}:0"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # One-shot: migrate the metadata DB and create the admin web user, then exit 0.
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username "${_AIRFLOW_WWW_USER_USERNAME:-airflow}" \
          --password "${_AIRFLOW_WWW_USER_PASSWORD:-airflow}" \
          --firstname Admin --lastname User --role Admin \
          --email admin@example.com || true
    depends_on:
      postgres:
        condition: service_healthy

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --local || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres-db:
  airflow-logs:
